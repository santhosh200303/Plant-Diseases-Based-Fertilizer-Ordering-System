<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/icon.png') }}">
    <title>AgriCare Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
       /* page background */
body{
    background:#f5f7fa;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

/* main container */
.container{
    margin-left:220px;
    padding:30px;
}

/* page title */
h1{
    font-size:36px;
    font-weight:600;
    color:#333;
    margin-bottom:20px;
}

/* cart button */
.btn-success{
    background:#093b31;
    border:none;
    padding:8px 18px;
    font-weight:600;
    border-radius:6px;
}

.btn-success:hover{
    background:#0d5244;
}

/* grid spacing */
.row{
    row-gap:25px;
}

/* card design */
.card{
    border:none;
    border-radius:12px;
    overflow:hidden;

    height:100%;

    transition:0.3s;

    background:white;

    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

/* hover effect */
.card:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

/* image container */
.card-img-container{

    height:160px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#f8f9fa;

    border-bottom:1px solid #eee;
}

/* product image */
.product-image{

    height:110px;
    width:110px;

    object-fit:contain;

    transition:0.3s;
}

.card:hover .product-image{
    transform:scale(1.08);
}

/* card body */
.card-body{

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    padding:18px;
}

/* product name */
.card-title{

    font-size:18px;
    font-weight:600;

    color:#222;
}

/* price */
.card-text{

    font-size:16px;
    color:#555;
}

/* add button */
.btn-primary{

    background:#093b31;
    border:none;

    padding:8px;

    border-radius:6px;

    font-weight:600;

    transition:0.3s;
}

.btn-primary:hover{

    background:#0d5244;

    transform:scale(1.05);
}

/* responsive layout */
@media(max-width:992px){

    .container{
        margin-left:0;
        padding:20px;
    }

    h1{
        font-size:28px;
    }

}

@media(max-width:768px){

    .product-image{

        height:90px;
        width:90px;
    }

}
        </style>
        
</head>
<body>
    {% include 'header.html' %}

    
    <div class="container">
        <h1 class="mt-4 text-center">Purchase Information</h1>
        <a href="{{ url_for('SupplierCart') }}" class="btn btn-success mb-3">My Cart ({{ session.get('cart', []) | length }})</a>

        <div class="container my-4">
            <div class="row">
                {% for product in products %}
                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-img-container">
                            <img src="static/product/{{ product['product_image'] }}" class="card-img-top product-image" alt="Product Image">
                        </div>
                        <div class="card-body text-center">
                            <h5 class="card-title">{{ product['product_name'] }}</h5>
                            <p class="card-text">Price: ₹{{ product['product_rate'] }}</p>
                            <form method="POST" action="{{ url_for('purchases') }}">
                                <input type="hidden" name="product_id" value="{{ product['product_id'] }}">
                                <input type="hidden" name="product_name" value="{{ product['product_name'] }}">
                                <input type="hidden" name="product_rate" value="{{ product['product_rate'] }}">
                                <button type="submit" class="btn btn-primary w-100">Add to Cart</button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        
        
    </div>
</body>
</html>
