<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/icon.png') }}">
    <title>AgriCare Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>

         .custom-navbar 
        {
            background-color: #093b31; /* Replace with your desired color */
        }
        .custom-navbar, .custom-navbar .nav-link 
        {
            color: white; /* Sets text color to white */
            font-size: 15px;
        }

        .custom-navbar .nav-link:hover 
        {
            color: #d1d1d1; /* Optional: Change color on hover */
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
           
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
            background-color: #093b31; /* Replace with your desired color */
            backdrop-filter: blur(5px);
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        nav .logo {
            display: flex;
            align-items: center;
            color: white;
            font-size: 32px;
            font-weight: bolder;
        }

        nav .logo img {
            width: 60px;
            margin-right: 10px;
        }

        nav .logo span {
            color: #FFBA00;
            margin-left: 5px;
        }

        nav .back-button {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 10px 20px;
            background-color: #FFBA00;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        nav .back-button:hover {
            background-color: white;
            color: #000;
        }
        /* Card container with shadow for aesthetics */
        .card {
            border-radius: 10px;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        
        /* Ensure the image is displayed like a symbol (icon-like) */
        .card-img-container {
            height: 150px; /* Set a consistent height */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            padding: 10px;
        }
        
        .product-image {
            height: 100px; /* Limit the image height */
            width: 100px; /* Limit the image width */
            object-fit: contain; /* Ensure the image scales proportionally */
            padding: 5px; /* Adds some inner space around the image */
        }
        
        /* Card body styling */
        .card-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
        }
        
        /* Button styling */
        .btn-primary {
            font-size: 14px;
            font-weight: 600;
            border-radius: 5px;
            margin-top: 10px;
        }
        @media screen and (max-width: 768px) {
            nav {
                height: 70px;
            }

            nav .logo {
                font-size: 24px;
            }

            nav .logo img {
                width: 50px;
            }
        }

        @media screen and (max-width: 400px) {
            nav .logo {
                font-size: 20px;
            }

            nav .logo img {
                width: 40px;
            }
        }
        </style>
        
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light custom-navbar">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <i class="fas fa-bars"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <a class="navbar-brand mt-2 mt-lg-0 text-white" href="">
          <img src="{{ url_for('static', filename='images/sprout.png') }}" height="60" alt="Logo" loading="lazy"/> Farmer 
        </a>
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-chart-line"></i>&nbsp;&nbsp; Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/sales"><i class="fas fa-archive"></i>&nbsp;&nbsp;Buy Product</a></li>
          <li class="nav-item"><a class="nav-link" href="/CustomerCart"><i class="fas fa-user"></i>&nbsp;&nbsp; My Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="/change_password"><i class="fas fa-user"></i>&nbsp;&nbsp;Change password</a></li>
        </ul>
      </div>
      <div class="d-flex align-items-center">
        <div class="dropdown">
          <a class="dropdown-toggle d-flex align-items-center hidden-arrow" href="#" id="navbarDropdownMenuAvatar" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <img src="{{ url_for('static', filename='images/admin.png') }}" class="rounded-circle" height="60" alt="Avatar" loading="lazy" />
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdownMenuAvatar">
            <li><a class="dropdown-item" href="/">Back to home</a></li>
            <li><a class="dropdown-item" href="/logout">Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    
    <div class="container">
        <h1 class="mt-4 text-center">Buy Products</h1>
        <a href="{{ url_for('CustomerCart') }}" class="btn btn-success mb-3">My Cart ({{ session.get('cart1', []) | length }})</a>

        <div class="container my-4">
            <div class="row">
                {% for Product in Products %}
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-img-container">
                            <img src="static/Product/{{ Product['product_image'] }}" class="card-img-top product-image" alt="Product Image">
                        </div>
                        <div class="card-body text-center">
                            <h5 class="card-title">{{ Product['product_name'] }}</h5>
                            <p class="card-text">Price: ₹{{ Product['product_rate'] }}</p>
                            <form method="POST" action="/sales">
                                <input type="hidden" name="product_id" value="{{ Product['product_id'] }}">
                                <input type="hidden" name="product_name" value="{{ Product['product_name'] }}">
                                <input type="hidden" name="product_rate" value="{{ Product['product_rate'] }}">
                                <button type="submit" class="btn btn-primary w-100">Add to Cart</button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        
        
    </div>
</body>
</html>
